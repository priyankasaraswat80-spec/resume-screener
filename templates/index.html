<!DOCTYPE html>
<html>
<head>
    <title>Resume Screener</title>
</head>
<body>
    <h2>AI Resume Screening</h2>
    <form method="POST">
        <textarea name="resume" placeholder="Paste Resume here"></textarea><br><br>
        <textarea name="job" placeholder="Paste Job Description"></textarea><br><br>
        <button type="submit">Check Match</button>
    </form>

    {% if score %}
        <h3>Match Score: {{score}}%</h3>
    {% endif %}
</body>
</html>
